<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SimplePong 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="pong"></canvas>
    <div id="score-overlay">
      <span id="score-player">0</span>
      <span id="score-sep">:</span>
      <span id="score-ai">0</span>
    </div>
  </div>
  <div id="controls">
    <label>
      <span>Ball Speed</span>
      <input type="range" id="speedSlider" min="1" max="20" value="5" />
      <span id="speedVal">5</span>
    </label>
    <label>
      <span>Ball Size</span>
      <input type="range" id="ballSlider" min="4" max="40" value="10" />
      <span id="ballVal">10</span>
    </label>
    <label>
      <span>Paddle Size</span>
      <input type="range" id="paddleSlider" min="20" max="280" value="130" />
      <span id="paddleVal">130</span>
    </label>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
